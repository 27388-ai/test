<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border: none;
            border-radius: 15px;
        }
        .card-header {
            border-top-left-radius: 15px !important;
            border-top-right-radius: 15px !important;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header text-white text-center py-3">
                        <h4 class="mb-0">📝 ฟอร์มเก็บข้อมูลนักเรียน</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="studentForm">
                            
                            <div class="mb-3">
                                <label for="prefix" class="form-label">คำนำหน้าชื่อ</label>
                                <select class="form-select" id="prefix" required>
                                    <option value="" selected disabled>-- เลือกคำนำหน้าชื่อ --</option>
                                    <option value="เด็กชาย">เด็กชาย</option>
                                    <option value="เด็กหญิง">เด็กหญิง</option>
                                    <option value="นาย">นาย</option>
                                    <option value="นางสาว">นางสาว</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">ชื่อจริง</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="กรอกชื่อจริง" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">นามสกุล</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="กรอกนามสกุล" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="grade" class="form-label">ชั้นมัธยมศึกษาปีที่</label>
                                    <select class="form-select" id="grade" required>
                                        <option value="" selected disabled>-- เลือกชั้นปี --</option>
                                        <option value="1">ม.1</option>
                                        <option value="2">ม.2</option>
                                        <option value="3">ม.3</option>
                                        <option value="4">ม.4</option>
                                        <option value="5">ม.5</option>
                                        <option value="6">ม.6</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="room" class="form-label">ห้อง</label>
                                    <input type="number" class="form-control" id="room" placeholder="เช่น 1" min="1" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="number" class="form-label">เลขที่</label>
                                <input type="number" class="form-control" id="number" placeholder="เช่น 1" min="1" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">💾 บันทึกข้อมูล</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันไม่ให้หน้าจอรีเฟรชตัวเอง

            // 🔗 อัปเดตเป็น URL ล่าสุดของคุณเรียบร้อยแล้วครับ
            const webAppUrl = "https://script.google.com/macros/s/AKfycby09QU1I-A11kUwKahMAvTnK1oLRHAKK4CpE7oCrjQ3kduXMjzzdTdYyeEUtQ0BOk_-/exec";

            // ดึงค่าข้อมูลจากฟอร์มมาเก็บไว้ในตัวแปร
            const prefix = document.getElementById('prefix').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const grade = document.getElementById('grade').value;
            const room = document.getElementById('room').value;
            const number = document.getElementById('number').value;

            // 1. แสดง SweetAlert หมุนโหลดเพื่อล็อกหน้าจอ
            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'ระบบกำลังส่งข้อมูลไปยัง Google Sheets กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // 2. สุ่มชื่อฟังก์ชัน Callback สไตล์ JSONP เพื่อไม่ให้ชื่อซ้ำกันตอนกดส่งหลายครั้ง
            const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
            
            // 3. สร้างฟังก์ชันดักรอรับการตอบกลับจาก Google Sheets
            window[callbackName] = function(response) {
                if (response.status === "success") {
                    // เปลี่ยนป๊อปอัปเป็นสีเขียวเมื่อบันทึกสำเร็จ
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ!',
                        text: response.message,
                        confirmButtonText: 'ตกลง'
                    });
                    document.getElementById('studentForm').reset(); // ล้างฟอร์มเคลียร์ค่าให้ว่าง
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาดจากสคริปต์!',
                        text: response.message
                    });
                }
                // ล้างแท็กสคริปต์และตัวแปรชั่วคราวออกจากระบบหลังรันงานเสร็จ
                document.body.removeChild(scriptTag);
                delete window[callbackName];
            };

            // 4. มัดรวมพารามิเตอร์ข้อมูลพร้อมแนบชื่อ callback ไปด้วย
            const params = new URLSearchParams({
                prefix: prefix,
                firstName: firstName,
                lastName: lastName,
                grade: grade,
                room: room,
                number: number,
                callback: callbackName
            });

            // 5. ส่งข้อมูลแบบ JSONP แท้ โดยการสร้างแท็ก <script> ไดนามิก เพื่อทะลวงข้าม CORS
            const scriptTag = document.createElement('script');
            scriptTag.src = `${webAppUrl}?${params.toString()}`;
            
            // ดักจับกรณีเกิดข้อผิดพลาดในการเชื่อมต่อเน็ตหรือ URL ล่ม
            scriptTag.onerror = function() {
                Swal.fire({
                    icon: 'error',
                    title: 'เชื่อมต่อล้มเหลว!',
                    text: 'ไม่สามารถติดต่อ Google Apps Script ได้ กรุณาตรวจสอบสถานะการ Deploy หรืออินเทอร์เน็ตของคุณ'
                });
                document.body.removeChild(scriptTag);
                delete window[callbackName];
            };

            // ปล่อยให้แท็กสคริปต์ทำงานโดยฝังเข้าไปในหน้าเอกสาร HTML
            document.body.appendChild(scriptTag);
        });
    </script>
</body>
</html>
